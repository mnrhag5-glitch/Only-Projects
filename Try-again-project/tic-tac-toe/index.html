<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<style>
    body{
        text-align: center;
        background-color: rgb(132, 148, 142);
    }
    .container{
        display: grid;
        grid-template-columns: repeat(3,80px);
        justify-content: center;
        margin-top: 100px;
       
}
h3{
    margin-top: 45px;
}
.box{
    height: 80px;
    width: 80px;
    font-size: 50px;
}
.reset{
    height: 30px;
    width: 90px;
    border-radius: 5px;
    border: none;
    margin-top: 20px;
    cursor: pointer;
}
</style>
<body>
    <h3>TIC-TAC-TOE</h3>

    <div class="container">
<button class="box"></button>
<button class="box"></button>
<button class="box"></button>
<button class="box"></button>
<button class="box"></button>
<button class="box"></button>
<button class="box"></button>
<button class="box"></button>
<button class="box"></button>


    </div>
    <p class="msg"></p>
    <button class="reset">reset</button>
    

    <script>

let boxes = document.querySelectorAll(".box")
let restart = document.querySelector(".reset")
let msg = document.querySelector(".msg")
 let turnO = true;
 let count = 0;
 for(let box of boxes){
    
    box.addEventListener("click",()=>{
        count++;
        if(turnO){
            box.innerText = "O"
            turnO = false
        }else{
            box.innerText = "X"
            turnO = true;
        }
        box.disabled = true;
        checkWinner()
        if(count==9&&!checkWinner()){
            draw()
        }
    })
 }

 let winPattern = [
     [0, 1, 2], // Row 1
  [3, 4, 5], // Row 2
  [6, 7, 8], // Row 3
  [0, 3, 6], // Column 1
  [1, 4, 7], // Column 2
  [2, 5, 8], // Column 3
  [0, 4, 8], // Main diagonal
  [2, 4, 6]  // Anti-dia
 ]

 function draw(){
    msg.innerText = "Draw🙌🙌"
 }


function checkWinner(){
        for(let pattern of winPattern){
            let a = boxes[pattern[0]].innerText
            let b = boxes[pattern[1]].innerText
            let c = boxes[pattern[2]].innerText

            if(a!==""&&b!==""&&c!==""){
                if(a==b&&b===c)
            {
                winner(a)
                return true
           
            }
            }
        }return false
}

function winner(a)
{
 msg.innerText = `Congratulation Winner is ${a} 🎉🎉` 
 disable();
   
}

function disable(){
    for(let box of boxes){
        box.disabled = true

    }
}

function resett(){
    for(let box of boxes){
        box.innerText = ""}
        msg.innerText = ""
        turnO = true
        count=0
        enable();
    
}

restart.addEventListener("click",()=>{
    resett()
})

function enable(){
       for(let box of boxes){
        box.disabled = false

    }
}
    </script>
</body>
</html>
