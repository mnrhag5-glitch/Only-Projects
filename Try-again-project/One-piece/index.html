<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      font-family: "Courier New", Courier, monospace;
      text-align: center;
      background-color: rgb(208, 205, 203);
    }
    .form {
      margin-top: 20px;
      display: flex;
      flex-wrap: wrap;
      gap: 5px;
      justify-content: center;

      button {
        cursor: pointer;
        width: 60px;
        border: 1px solid black;
        border-radius: 5px;
      }
    }
    h1 {
      margin-top: 30px;
    }
    input {
      border: 1px solid black;
      border-radius: 3px;
      height: 30px;
    }
    .table {
      border-collapse: collapse;
      width: 80%;
      margin: 10px auto;
    }
    th,
    tr {
      border: 1px solid black;
      /* background-color: rgb(221, 217, 214); */
    }
  </style>
  <body>
    <h1>One-Piece</h1>

    <form class="form">
      <input type="text" class="cap" placeholder="Captain" />
      <input type="number" class="Bounty" placeholder="Bounty" />
      <input type="text" class="Vice-Captain" placeholder="Vice-Captain" />
      <input type="number" class="Bounty2" placeholder="Bounty" />
      <button>submit</button>
    </form>

    <table class="table">
      <tr>
        <th>Captain</th>
        <th>Bounty</th>
        <th>Vice-Captain</th>
        <th>Bounty</th>
      </tr>

      <tbody class="tableBody"></tbody>
    </table>

    <script>
      let pirets = JSON.parse(localStorage.getItem("pirets")) || [];
      let form = document.querySelector(".form");

      let cap = document.querySelector(".cap");
      let bounty = document.querySelector(".Bounty");
      let vice = document.querySelector(".Vice-Captain");
      let bounty2 = document.querySelector(".Bounty2");
      let tableBody = document.querySelector(".tableBody");

      form.addEventListener("submit", (e) => {
        e.preventDefault();
        if (
          cap.value == "" ||
          bounty.value == "" ||
          vice.value == "" ||
          bounty2.value == ""
        ) {
          alert("Fill all info");
          return;
        }

        pirets.push({
          cap: cap.value,
          bounty: bounty.value,
          vice: vice.value,
          bounty2: bounty2.value,
        });

        localStorage.setItem("pirets", JSON.stringify(pirets));
        showData();
        form.reset();
      });

      function showData() {
        tableBody.innerHTML = "";
        for (let piret of pirets) {
          tableBody.innerHTML += `
        <tr>
            <td>${piret.cap}</td>
            <td>${piret.bounty}</td>
            <td>${piret.vice}</td>
            <td>${piret.bounty2}</td>
        
            </tr>

        `;
        }
      }
     showData();
    </script>
  </body>
</html>
