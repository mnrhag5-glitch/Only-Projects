<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Registration System</title>
</head>
<link rel="stylesheet" href="style.css">
<body>
    <header>
        <h2>Student Registration System</h2>
        
    </header>
    <form class="form">
        <input type="name" class="name" placeholder="Student-Name">
        <input type="Student id" class="student id" placeholder="Student-id">
        <input type="email" class="email" placeholder="Enter Email-Id">
        <input type="number" class="number" placeholder="Phone Number">
    </form>
    <button class="button">submit</button>
<table class="table">
    <td>
        <th>Name</th>
        <th>Student-ID</th>
        <th>Email</th>
        <th>Phone Number</th>
    </td>
</table>











    <script src="app.js"></script>
</body>
</html>
