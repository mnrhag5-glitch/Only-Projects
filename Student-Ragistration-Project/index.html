    <link rel="stylesheet" href="style.css">
</head>
<body>

    <h2>Student Registration System</h2>

    <form class="form">

        <button>Add Student</button>
    </form>

    <table border="1">

                <th>ID</th>
                <th>Email</th>
                <th>number</th>
                <th>action</th>
                <th>action</th>
            </tr>
        </thead>

        <tbody class="tableBody">

        </tbody>
    </table>

    <script src="app.js"></script>

</body>
</html>
